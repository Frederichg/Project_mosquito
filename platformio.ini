[platformio]
default_envs = step2

[env]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
upload_speed = 460800

; Dependencies
lib_deps =
    knolleary/PubSubClient@^2.8.0
    bblanchon/ArduinoJson@^6.21.3
    adafruit/Adafruit MCP23017 Arduino Library@^2.3.2

; Build flags
build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=0

[env:step1]
build_src_filter =
    -<*>
    +<mqtt_sender.cpp>

[env:step2]
build_src_filter =
    -<*>
    +<step2/esp32_bidirectional.cpp>
